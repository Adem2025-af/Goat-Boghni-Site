<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat - Restaurant Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        title: ['"Playfair Display"', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif']
                    },
                    colors: {
                        gold: { DEFAULT: '#D4AF37', dark: '#aa8b2c', light: '#f2d492' },
                        dark: '#0f0a08'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f0a08;
            background-image: linear-gradient(rgba(15,10,8,0.85), rgba(15,10,8,0.95)), url('fond.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
        }
        .btn-harmony { font-family: 'Playfair Display', serif; font-weight: 700; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .glass-premium { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(212, 175, 55, 0.2); }
        .section-hidden { display: none !important; }
        .section-visible { display: block !important; animation: reveal 0.8s ease-out forwards; }
        @keyframes reveal { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        #back-button { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 200; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .hero-title { font-family: 'Playfair Display', serif; line-height: 1.1; }
        .category-btn.active { background-color: #D4AF37; color: #0f0a08; border-color: #D4AF37; }
    </style>
</head>
<body class="font-sans">

    <nav class="fixed w-full z-[100] glass-premium">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="#" onclick="goHome()" class="text-3xl hero-title font-black text-gold italic">Goat.</a>
            <div class="flex items-center gap-4">
                <button onclick="showSection('commande')" class="relative p-3 glass-premium rounded-full">
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-gold text-dark text-[10px] font-bold h-5 w-5 rounded-full flex items-center justify-center hidden">0</span>
                    <svg class="w-6 h-6 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <button id="back-button" onclick="goHome()" class="section-hidden btn-harmony px-10 py-4 bg-white text-black rounded-full hover:bg-gold transition-all text-sm tracking-wide">
        ← REVENIR
    </button>

    <section id="hero-section" class="min-h-screen flex items-center justify-center text-center px-6">
        <div data-aos="fade-up" data-aos-duration="1000">
            <span class="text-gold tracking-[0.5em] font-semibold uppercase text-xs mb-6 block">Gastronomie Italienne • Boghni</span>
            <h1 class="text-6xl md:text-8xl hero-title font-black mb-16">L'Art de <br><span class="text-gold italic">la Saveur.</span></h1>
            <div class="flex flex-col md:flex-row gap-6 justify-center items-center mt-24 md:mt-32">
                <button onclick="showSection('menu')" class="btn-harmony w-64 px-8 py-5 bg-gold text-dark rounded-full hover:scale-110 shadow-2xl shadow-gold/20 text-lg">Consulter le Menu</button>
                <button onclick="showSection('location')" class="btn-harmony w-64 px-8 py-5 glass-premium border border-gold/40 rounded-full hover:bg-gold/10 text-white text-lg">📍 Localisation</button>
                <button onclick="showSection('commande')" class="btn-harmony w-64 px-8 py-5 glass-premium border border-white/20 rounded-full hover:bg-white/10 text-white text-lg">Commander</button>
            </div>
        </div>
    </section>

    <section id="menu-section" class="section-hidden py-32 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-wrap justify-center gap-4 mb-20">
               <div class="flex flex-wrap justify-center gap-4 mb-20">
    <button class="category-btn btn-harmony px-8 py-3 rounded-full glass-premium text-sm" onclick="filterMenu(2)">Burgers</button>
    <button class="category-btn btn-harmony px-8 py-3 rounded-full glass-premium text-sm" onclick="filterMenu(3)">Pizzas</button>
    <button class="category-btn btn-harmony px-8 py-3 rounded-full glass-premium text-sm" onclick="filterMenu(5)">Tacos & Snacks</button>
    <button class="category-btn btn-harmony px-8 py-3 rounded-full glass-premium text-sm" onclick="filterMenu(4)">Boissons</button>
    <button class="category-btn btn-harmony px-8 py-3 rounded-full glass-premium text-sm" onclick="filterMenu(1)">Plats</button>
</div>
            </div>
            <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <section id="location-section" class="section-hidden py-32 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-5xl hero-title text-gold mb-16 italic">📍 Où nous trouver</h2>
            <div class="glass-premium p-4 rounded-[3rem] h-[500px]">
                <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3211.234!2d3.951!3d36.541!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzbCsDMyJzI3LjYiTiAzwrA1NycwMy42IkU!5e0!3m2!1sfr!2sdz!4v1711895000000" width="100%" height="100%" style="border:0; border-radius: 2rem;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <section id="commande-section" class="section-hidden py-32 px-6">
        <div class="max-w-xl mx-auto glass-premium p-10 rounded-[3rem]">
            <h3 class="text-3xl hero-title text-gold mb-8 italic text-center">Finaliser votre commande</h3>
            <div id="cart-summary" class="mb-8 space-y-3 font-semibold"></div>
            <form onsubmit="sendWhatsApp(event)" class="space-y-6">
                <input type="text" id="client_nom" placeholder="VOTRE NOM" required class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-gold text-white">
                <input type="text" id="adresse" placeholder="ADRESSE DE LIVRAISON" required class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-gold text-white">
                <button type="submit" class="btn-harmony w-full py-6 bg-gold text-dark rounded-2xl shadow-xl text-lg">CONFIRMER SUR WHATSAPP</button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-600 text-xs tracking-widest uppercase">© 2026 Goat Boghni • Excellence & Saveurs</footer>

    <script>
        const SUPABASE_URL = 'https://zsgssdhngvlfsrybjlbq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Gz5KyJA27t70tlBJ9TWpww_QFIL--qR'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let categories = [];
        let cart = [];

        async function loadMenu() {
            const { data: catData } = await _supabase.from('categorie').select('*');
            categories = catData || [];
            const { data: prodData, error } = await _supabase.from('produits').select('*');
            if (error) return console.error(error.message);
            products = prodData;
            if (categories.length > 0) filterMenu(categories[0].id);
        }

        function filterMenuByName(name) {
            const cat = categories.find(c => c.nom.toLowerCase().includes(name.toLowerCase()));
            if (cat) filterMenu(cat.id);
        }

        function filterMenu(catId) {
            const grid = document.getElementById('products-grid');
            const btns = document.querySelectorAll('.category-btn');
            
            btns.forEach(b => {
                const currentCat = categories.find(c => c.id === catId);
                b.classList.toggle('active', currentCat && b.innerText.toLowerCase().includes(currentCat.nom.toLowerCase().substring(0,3)));
            });
            
            const filtered = products.filter(p => p.categorie_id == catId);
            grid.innerHTML = filtered.length ? filtered.map(p => `
                <div class="glass-premium p-5 rounded-[2.5rem] group hover:border-gold transition-all duration-500">
                    <div class="overflow-hidden rounded-[2rem] mb-6">
                        <img src="${p.image}" class="h-56 w-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/300?text=Goat+Boghni'">
                    </div>
                    <h3 class="btn-harmony text-lg mb-2 text-white">${p.nom}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-3xl font-black text-gold">${p.prix} DA</span>
                        <button onclick="addToCart(${p.id})" class="bg-gold text-dark p-4 rounded-2xl hover:bg-white transition-colors font-bold">＋</button>
                    </div>
                </div>`).join('') : `<div class="col-span-full text-center py-10 text-gray-500 italic">Bientôt disponible...</div>`;
        }

        function showSection(id) {
            document.getElementById('hero-section').classList.add('section-hidden');
            document.getElementById('back-button').className = 'section-visible btn-harmony px-10 py-4 bg-white text-black rounded-full hover:bg-gold transition-all text-sm tracking-wide';
            ['menu-section', 'location-section', 'commande-section'].forEach(s => {
                document.getElementById(s).classList.add('section-hidden');
                document.getElementById(s).classList.remove('section-visible');
            });
            document.getElementById(id + '-section').classList.replace('section-hidden', 'section-visible');
            if(id === 'menu') loadMenu();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            ['menu-section', 'location-section', 'commande-section', 'back-button'].forEach(id => document.getElementById(id).classList.add('section-hidden'));
            document.getElementById('hero-section').classList.remove('section-hidden');
        }

        function addToCart(id) {
            const product = products.find(x => x.id === id);
            cart.push(product);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.remove('hidden');
            confetti({ particleCount: 40, spread: 60, colors: ['#D4AF37', '#ffffff'], origin: { y: 0.9 } });
            updateCartSummary();
        }

        function updateCartSummary() {
            const total = cart.reduce((acc, curr) => acc + curr.prix, 0);
            document.getElementById('cart-summary').innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                    <span>${item.nom}</span><span class="text-gold">${item.prix} DA</span>
                </div>`).join('') + `<div class="text-center pt-6 text-2xl font-black text-gold">TOTAL : ${total} DA</div>`;
        }

        function sendWhatsApp(e) {
            e.preventDefault();
            if(!cart.length) return alert("Votre panier est vide !");
            const text = `⚜️ *COMMANDE GOAT* ⚜️\n\n` + cart.map(i => `• ${i.nom} (${i.prix} DA)`).join('\n') + 
                         `\n\n👤 *Client* : ${document.getElementById('client_nom').value}\n📍 *Adresse* : ${document.getElementById('adresse').value}\n💰 *TOTAL* : ${cart.reduce((a,b)=>a+b.prix,0)} DA`;
            window.open(`https://wa.me/213672162788?text=${encodeURIComponent(text)}`);
        }

        AOS.init();
        loadMenu(); 
    </script>
</body>
</html>
