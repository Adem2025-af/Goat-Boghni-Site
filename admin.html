<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Gestion du Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 500px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; }
        .product-item { background: #2a2a2a; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #e74c3c; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Gestion du Menu 🍔</h1>

    <div class="card">
        <h3>Ajouter un produit</h3>
        <input type="text" id="nom" placeholder="Nom du produit (ex: Tacos Lyon)">
        <input type="number" id="prix" placeholder="Prix (DA)">
        
        <select id="categorieSelect">
            <option value="">Chargement des catégories...</option>
        </select>

        <label>Photo du plat :</label>
        <input type="file" id="imageFile" accept="image/*">

        <button onclick="ajouterProduit()" id="btnSubmit">METTRE EN LIGNE</button>
    </div>

    <h3>Liste des produits</h3>
    <div id="listeProduits">Chargement...</div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://mshnfkduobuouqxtuhaa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WIDRhfioHCEGTUOoU5Rz2A_t6278M-i';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 1. CHARGER LES CATÉGORIES ---
        async function chargerCategories() {
            const { data, error } = await _supabase.from('categorie').select('*');
            const select = document.getElementById('categorieSelect');
            if (data) {
                select.innerHTML = data.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
            }
        }

        // --- 2. CHARGER LES PRODUITS ---
        async function chargerProduits() {
            const { data } = await _supabase.from('produits').select('*, categorie(nom)');
            const liste = document.getElementById('listeProduits');
            if (data) {
                liste.innerHTML = data.map(p => `
                    <div class="product-item">
                        <span>${p.nom} (${p.prix} DA) - <i>${p.categorie?.nom}</i></span>
                        <button class="btn-delete" onclick="supprimerProduit(${p.id})">Supprimer</button>
                    </div>
                `).join('');
            }
        }

        // --- 3. AJOUTER UN PRODUIT + IMAGE ---
        async function ajouterProduit() {
            const btn = document.getElementById('btnSubmit');
            const file = document.getElementById('imageFile').files[0];
            const nom = document.getElementById('nom').value;
            const prix = document.getElementById('prix').value;
            const catId = document.getElementById('categorieSelect').value;

            if (!file || !nom || !prix) return alert("Remplis tout !");
            
            btn.disabled = true;
            btn.innerText = "Envoi en cours...";

            try {
                // A. Upload de l'image
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('images-produits')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // B. Récupérer l'URL publique
                const { data: urlData } = _supabase.storage.from('images-produits').getPublicUrl(fileName);
                const imageUrl = urlData.publicUrl;

                // C. Insérer dans la table produits
                const { error: insertError } = await _supabase.from('produits').insert([
                    { nom, prix: parseInt(prix), image: imageUrl, categorie_id: parseInt(catId) }
                ]);

                if (insertError) throw insertError;

                alert("Produit ajouté !");
                location.reload();

            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "METTRE EN LIGNE";
            }
        }

        // --- 4. SUPPRIMER ---
        async function supprimerProduit(id) {
            if (confirm("Supprimer ce produit ?")) {
                await _supabase.from('produits').delete().eq('id', id);
                chargerProduits();
            }
        }

        // Lancement au démarrage
        chargerCategories();
        chargerProduits();
    </script>
</body>
</html>
