<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Admin - Gestion Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .admin-card { background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { text-align: center; color: #3ecf8e; margin-bottom: 15px; }
        h3 { color: #3ecf8e; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-size: 0.85rem; color: #aaa; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #3ecf8e; color: #121212; }
        .btn-delete { background: #ff4d4d; color: white; padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; border:none; cursor: pointer; }
        .product-list { width: 100%; max-width: 450px; background: #1e1e1e; border-radius: 15px; padding: 20px; border: 1px solid #333; }
        .product-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
        .loading { display: none; text-align: center; color: #3ecf8e; margin-top: 15px; }
        .error-msg { color: #ff4d4d; font-size: 0.8rem; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Gestion du Menu 🍔</h2>
    <label>Nom du produit</label>
    <input type="text" id="nom" placeholder="ex: Tacos Lyon">
    <label>Prix (DA)</label>
    <input type="number" id="prix" placeholder="ex: 750">
    <label>Catégorie</label>
    <select id="categorieSelect"><option value="">Chargement...</option></select>
    <label>Photo du plat</label>
    <input type="file" id="imageFile" accept="image/*">
    <button id="btnAjouter" class="btn btn-add" onclick="ajouterProduit()">METTRE EN LIGNE</button>
    <div id="loader" class="loading">⏳ Envoi en cours...</div>
    <div id="error-display" class="error-msg"></div>
</div>

<div class="product-list">
    <h3>Liste des produits</h3>
    <div id="listeContenu">Chargement...</div>
</div>

<script>
    const SUPABASE_URL = 'https://zsgssdhngvlfsrybjlbq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Gz5KyJA27t70tlBJ9TWpww_QFIL--qR'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.addEventListener('DOMContentLoaded', () => {
        chargerCategories();
        chargerProduits();
    });

    async function chargerCategories() {
        try {
            const { data, error } = await _supabase.from('categorie').select('*').order('id');
            const select = document.getElementById('categorieSelect');
            if (error) throw error;
            select.innerHTML = data.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
        } catch (err) { document.getElementById('error-display').innerText = "Erreur : " + err.message; }
    }

    async function ajouterProduit() {
        const nom = document.getElementById('nom').value.trim();
        const prix = document.getElementById('prix').value;
        const catId = document.getElementById('categorieSelect').value;
        const file = document.getElementById('imageFile').files[0];
        if (!nom || !prix || !file || !catId) return alert("Remplissez tous les champs !");

        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        try {
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { error: upErr } = await _supabase.storage.from('images-produits').upload(fileName, file);
            if (upErr) throw upErr;

            const { data: urlData } = _supabase.storage.from('images-produits').getPublicUrl(fileName);
            const { error: dbErr } = await _supabase.from('produits').insert([{
                nom: nom, prix: parseInt(prix), categorie_id: parseInt(catId), image: urlData.publicUrl
            }]);
            if (dbErr) throw dbErr;
            alert("Produit ajouté !"); location.reload();
        } catch (err) { alert("Erreur : " + err.message); }
        finally { loader.style.display = 'none'; }
    }

    async function chargerProduits() {
        const liste = document.getElementById('listeContenu');
        try {
            const { data, error } = await _supabase.from('produits').select('*').order('id', { ascending: false });
            if (error) throw error;
            liste.innerHTML = data.map(p => `
                <div class="product-item">
                    <span><strong>${p.nom}</strong> - ${p.prix} DA</span>
                    <button class="btn-delete" onclick="supprimerProduit(${p.id})">Supprimer</button>
                </div>`).join('');
        } catch (err) { liste.innerHTML = "Erreur de chargement."; }
    }

    async function supprimerProduit(id) {
        if (confirm("Supprimer ce produit ?")) {
            await _supabase.from('produits').delete().eq('id', id);
            chargerProduits();
        }
    }
</script>
</body>
</html>
